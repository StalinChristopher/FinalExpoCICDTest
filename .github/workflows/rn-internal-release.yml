# Manual internal release: bare (Gradle + Fastlane) or EAS submit (Expo), per platform.
name: RN — internal release

on:
  workflow_dispatch:
    inputs:
      build_system:
        description: "auto | bare | expo-local | expo-cloud"
        type: choice
        options: [auto, bare, expo-local, expo-cloud]
        default: auto
      platform:
        description: android | ios | both
        type: choice
        options: [android, ios, both]
        default: both
      branch:
        description: "Git branch or ref to build (e.g. main)"
        required: true
        type: string
      release_notes:
        description: Short notes for stakeholders (optional, bare Android)
        required: false
        type: string
        default: ""
      dry_run:
        description: Skips store upload / TestFlight (bare) or eas submit (Expo)
        required: false
        type: boolean
        default: false
      upload_to_testflight:
        description: After gym, upload IPA to TestFlight (bare iOS only)
        required: false
        type: boolean
        default: true
      eas_profile:
        description: EAS submit profile (Expo)
        required: false
        type: string
        default: production

concurrency:
  group: rn-internal-release-${{ github.repository }}-${{ inputs.branch }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      build_system: ${{ steps.pick.outputs.build_system }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
      - id: pick
        run: |
          BS="${{ inputs.build_system }}"
          if [ "$BS" = "auto" ]; then
            if [ -f "eas.json" ]; then
              echo "build_system=expo-local" >> $GITHUB_OUTPUT
            else
              echo "build_system=bare" >> $GITHUB_OUTPUT
            fi
          else
            echo "build_system=$BS" >> $GITHUB_OUTPUT
          fi

  android-bare:
    needs: [detect]
    if: needs.detect.outputs.build_system == 'bare' && (inputs.platform == 'android' || inputs.platform == 'both')
    uses: ./.github/workflows/rn-job-android-internal-release-bare.yml
    with:
      branch: ${{ inputs.branch }}
      release_notes: ${{ inputs.release_notes }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit

  android-expo:
    needs: [detect]
    if: |
      (needs.detect.outputs.build_system == 'expo-local' || needs.detect.outputs.build_system == 'expo-cloud') &&
      (inputs.platform == 'android' || inputs.platform == 'both')
    uses: ./.github/workflows/rn-job-android-internal-release-expo.yml
    with:
      branch: ${{ inputs.branch }}
      profile: ${{ inputs.eas_profile }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit

  ios-bare:
    needs: [detect]
    if: needs.detect.outputs.build_system == 'bare' && (inputs.platform == 'ios' || inputs.platform == 'both')
    uses: ./.github/workflows/rn-job-ios-internal-release-bare.yml
    with:
      branch: ${{ inputs.branch }}
      dry_run: ${{ inputs.dry_run }}
      upload_to_testflight: ${{ inputs.upload_to_testflight }}
    secrets: inherit

  ios-expo:
    needs: [detect]
    if: |
      (needs.detect.outputs.build_system == 'expo-local' || needs.detect.outputs.build_system == 'expo-cloud') &&
      (inputs.platform == 'ios' || inputs.platform == 'both')
    uses: ./.github/workflows/rn-job-ios-internal-release-expo.yml
    with:
      branch: ${{ inputs.branch }}
      profile: ${{ inputs.eas_profile }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit
